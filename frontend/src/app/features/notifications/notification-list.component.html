<section class="notification-list" [class.compact]="variant === 'compact'" [class.grid]="variant === 'grid'" *ngIf="notifications.length; else emptyState">
  <article class="notification-item" *ngFor="let notification of notifications" [class.unread]="!notification.read">
    <span class="notification-dot" [class.active]="notification.status === 'inProgress'" [class.done]="notification.status === 'completed'"></span>
    <div>
      <strong>{{ notification.title }}</strong>
      <p>{{ notification.message }}</p>
      <small>{{ notification.read ? 'Read - ' : '' }}{{ formatNotificationTime(notification.createdAt) }}</small>
    </div>
    <div class="notification-actions" *ngIf="showActions">
      <button
        type="button"
        *ngIf="!notification.read"
        (click)="markReadRequested.emit(notification)"
        [disabled]="isBusy(notification)"
        title="Mark as read"
        aria-label="Mark notification as read"
      >
        <svg lucideCheck aria-hidden="true"></svg>
      </button>
      <button
        class="danger"
        type="button"
        (click)="deleteRequested.emit(notification)"
        [disabled]="isBusy(notification)"
        title="Delete notification"
        aria-label="Delete notification"
      >
        <svg lucideTrash2 aria-hidden="true"></svg>
      </button>
    </div>
  </article>
</section>

<ng-template #emptyState>
  <p class="empty-copy">{{ emptyText }}</p>
</ng-template>
