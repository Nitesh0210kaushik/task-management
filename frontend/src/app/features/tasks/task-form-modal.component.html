<div class="modal-backdrop" (click)="close()">
  <form
    class="task-modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="task-modal-title"
    [formGroup]="taskForm"
    (ngSubmit)="submitTask()"
    (keydown.escape)="close()"
    (click)="$event.stopPropagation()"
  >
    <div class="composer-heading">
      <div>
        <span>{{ editingTask ? 'Editing task' : 'New task' }}</span>
        <h2 id="task-modal-title">{{ editingTask ? editingTask.title : 'Create task' }}</h2>
      </div>
      <button type="button" (click)="close()" title="Close form" aria-label="Close form">
        <svg lucideX aria-hidden="true"></svg>
      </button>
    </div>

    <div class="form-grid">
      <label>
        <span>Title</span>
        <input type="text" formControlName="title" placeholder="Prepare weekly status report" />
        <small *ngIf="taskForm.controls.title.touched && taskForm.controls.title.invalid">Title must be 2 to 120 characters.</small>
      </label>

      <label>
        <span>Status</span>
        <select formControlName="status">
          <option value="backlog">Backlog</option>
          <option value="inProgress">In Progress</option>
          <option value="completed">Done</option>
        </select>
      </label>

      <label class="wide">
        <span>Description</span>
        <textarea rows="3" formControlName="description" placeholder="Add scope, priority, and next steps"></textarea>
        <small *ngIf="taskForm.controls.description.touched && taskForm.controls.description.invalid">
          Description must be 2 to 1000 characters.
        </small>
      </label>

      <label *ngIf="canAssignTasks">
        <span>Owner</span>
        <select formControlName="assignedTo">
          <option value="">Self</option>
          <option *ngFor="let user of assignableUsers" [value]="user.id">{{ user.username }} - {{ roleLabel(user.role) }}</option>
        </select>
      </label>
    </div>

    <button class="save-button" type="submit" [disabled]="taskForm.invalid || isSaving">
      <svg *ngIf="editingTask; else createIcon" lucidePencil aria-hidden="true"></svg>
      <ng-template #createIcon>
        <svg lucidePlus aria-hidden="true"></svg>
      </ng-template>
      <span>{{ isSaving ? 'Saving' : editingTask ? 'Update task' : 'Create task' }}</span>
    </button>
  </form>
</div>
