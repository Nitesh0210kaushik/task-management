<main class="auth-page">
  <section class="auth-shell">
    <div class="brand-panel">
      <p class="eyebrow">Eminence Tasks</p>
      <h1>Create Employee Account</h1>
    </div>

    <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
      <div class="auth-heading">
        <span class="heading-icon">
          <svg lucideUserPlus aria-hidden="true"></svg>
        </span>
        <div>
          <p class="eyebrow">Employee Register</p>
          <h2>Join workspace</h2>
        </div>
      </div>

      <label class="field">
        <span>Name</span>
        <div
          class="control"
          [class.invalid]="form.controls.username.touched && form.controls.username.invalid"
          [class.valid]="form.controls.username.touched && form.controls.username.valid"
        >
          <svg lucideUser aria-hidden="true"></svg>
          <input
            type="text"
            formControlName="username"
            autocomplete="name"
            placeholder="Enter your name"
            aria-describedby="register-name-error"
            [attr.aria-invalid]="form.controls.username.touched && form.controls.username.invalid"
          />
        </div>
        <small id="register-name-error" role="alert" *ngIf="form.controls.username.touched && form.controls.username.invalid">Name must be at least 2 characters.</small>
      </label>

      <label class="field">
        <span>Email</span>
        <div
          class="control"
          [class.invalid]="form.controls.email.touched && form.controls.email.invalid"
          [class.valid]="form.controls.email.touched && form.controls.email.valid"
        >
          <svg lucideMail aria-hidden="true"></svg>
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="Enter your email"
            aria-describedby="register-email-error"
            [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid"
          />
        </div>
        <small id="register-email-error" role="alert" *ngIf="form.controls.email.touched && form.controls.email.invalid">Enter a valid email.</small>
      </label>

      <label class="field">
        <span>Password</span>
        <div
          class="control"
          [class.invalid]="form.controls.password.touched && form.controls.password.invalid"
          [class.valid]="form.controls.password.touched && form.controls.password.valid"
        >
          <svg lucideLock aria-hidden="true"></svg>
          <input
            type="password"
            formControlName="password"
            autocomplete="new-password"
            placeholder="Create a secure password"
            aria-describedby="register-password-error"
            [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
          />
        </div>
        <small id="register-password-error" role="alert" *ngIf="form.controls.password.touched && form.controls.password.invalid">Password must be at least 8 characters.</small>
      </label>

      <label class="field">
        <span>Confirm Password</span>
        <div
          class="control"
          [class.invalid]="form.controls.confirmPassword.touched && (form.controls.confirmPassword.invalid || form.hasError('passwordMismatch'))"
          [class.valid]="form.controls.confirmPassword.touched && form.controls.confirmPassword.valid && !form.hasError('passwordMismatch')"
        >
          <svg lucideLock aria-hidden="true"></svg>
          <input
            type="password"
            formControlName="confirmPassword"
            autocomplete="new-password"
            placeholder="Confirm your password"
            aria-describedby="register-confirm-password-error"
            [attr.aria-invalid]="form.controls.confirmPassword.touched && (form.controls.confirmPassword.invalid || form.hasError('passwordMismatch'))"
          />
        </div>
        <small
          id="register-confirm-password-error"
          role="alert"
          *ngIf="form.controls.confirmPassword.touched && (form.controls.confirmPassword.invalid || form.hasError('passwordMismatch'))"
        >
          {{ form.controls.confirmPassword.hasError('required') ? 'Confirm your password.' : 'Passwords must match.' }}
        </small>
      </label>

      <button class="primary-button" type="submit" [disabled]="form.invalid || isSubmitting">
        <span>{{ isSubmitting ? 'Creating account' : 'Create account' }}</span>
      </button>

      <p class="switch-link">
        Already registered?
        <a routerLink="/login">Sign in</a>
      </p>
    </form>
  </section>
</main>
