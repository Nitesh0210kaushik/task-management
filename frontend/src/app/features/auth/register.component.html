<main class="auth-page">
  <section class="auth-shell">
    <div class="brand-panel">
      <p class="eyebrow">Eminence Tasks</p>
      <h1>Create Employee Account</h1>
    </div>

    <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
      <div class="auth-heading">
        <span class="heading-icon">
          <svg lucideUserPlus aria-hidden="true"></svg>
        </span>
        <div>
          <p class="eyebrow">Employee Register</p>
          <h2>Join workspace</h2>
        </div>
      </div>

      <label class="field">
        <span>Name</span>
        <div class="control">
          <svg lucideUser aria-hidden="true"></svg>
          <input type="text" formControlName="username" autocomplete="name" placeholder="Enter your name" />
        </div>
        <small *ngIf="form.controls.username.touched && form.controls.username.invalid">Name must be at least 2 characters.</small>
      </label>

      <label class="field">
        <span>Email</span>
        <div class="control">
          <svg lucideMail aria-hidden="true"></svg>
          <input type="email" formControlName="email" autocomplete="email" placeholder="you@company.com" />
        </div>
        <small *ngIf="form.controls.email.touched && form.controls.email.invalid">Enter a valid email.</small>
      </label>

      <label class="field">
        <span>Password</span>
        <div class="control">
          <svg lucideLock aria-hidden="true"></svg>
          <input type="password" formControlName="password" autocomplete="new-password" placeholder="Create a secure password" />
        </div>
        <small *ngIf="form.controls.password.touched && form.controls.password.invalid">Password must be at least 8 characters.</small>
      </label>

      <button class="primary-button" type="submit" [disabled]="form.invalid || isSubmitting">
        <span>{{ isSubmitting ? 'Creating account' : 'Create account' }}</span>
        <svg lucideArrowRight aria-hidden="true"></svg>
      </button>

      <p class="switch-link">
        Already registered?
        <a routerLink="/login">Sign in</a>
      </p>
    </form>
  </section>
</main>
