<main class="auth-page">
  <section class="auth-shell">
    <div class="brand-panel">
      <p class="eyebrow">Eminence Tasks</p>
      <h1>Workspace Command Center</h1>
    </div>

    <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
      <div class="auth-heading">
        <span class="heading-icon">
          <svg lucideLogIn aria-hidden="true"></svg>
        </span>
        <div>
          <p class="eyebrow">Sign In</p>
          <h2>Welcome back</h2>
        </div>
      </div>

      <label class="field">
        <span>Email</span>
        <div
          class="control"
          [class.invalid]="form.controls.email.touched && form.controls.email.invalid"
          [class.valid]="form.controls.email.touched && form.controls.email.valid"
        >
          <svg lucideMail aria-hidden="true"></svg>
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="Enter your email"
            aria-describedby="login-email-error"
            [attr.aria-invalid]="form.controls.email.touched && form.controls.email.invalid"
          />
        </div>
        <small id="login-email-error" role="alert" *ngIf="form.controls.email.touched && form.controls.email.invalid">Enter a valid email.</small>
      </label>

      <div class="field">
        <label for="login-password">Password</label>
        <div
          class="control password-control"
          [class.invalid]="form.controls.password.touched && form.controls.password.invalid"
          [class.valid]="form.controls.password.touched && form.controls.password.valid"
        >
          <svg lucideLock aria-hidden="true"></svg>
          <input
            id="login-password"
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            autocomplete="current-password"
            placeholder="Enter your password"
            aria-describedby="login-password-error"
            [attr.aria-invalid]="form.controls.password.touched && form.controls.password.invalid"
          />
          <button
            class="visibility-toggle"
            type="button"
            (click)="togglePasswordVisibility()"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            [attr.title]="showPassword ? 'Hide password' : 'Show password'"
          >
            <svg *ngIf="!showPassword" lucideEye aria-hidden="true"></svg>
            <svg *ngIf="showPassword" lucideEyeOff aria-hidden="true"></svg>
          </button>
        </div>
        <small id="login-password-error" role="alert" *ngIf="form.controls.password.touched && form.controls.password.invalid">Password is required.</small>
      </div>

      <button class="primary-button" type="submit" [disabled]="form.invalid || isSubmitting">
        <span>{{ isSubmitting ? 'Signing in' : 'Sign in' }}</span>
      </button>

      <p class="switch-link">
        New here?
        <a routerLink="/register">Create account</a>
      </p>
    </form>
  </section>
</main>
